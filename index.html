<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20-20-20</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<meta name="google-site-verification" content="4gOVgrtaw2oyczZdUmvQj8FGniu_RUZ3VXNZgEW04Yc" />
</head>
<body>

<main class="stage">

  <p class="state-label" id="stateLabel">Focus</p>

  <div class="dial" id="dial">
    <span class="clock" id="clock">20:00</span>
    <p class="message" id="message">Stay on task. Your eyes will thank you in&hellip;</p>
  </div>

  <div class="glyph-wrap" aria-hidden="true">
    <span class="glyph" id="glyph"></span>
  </div>

  <button class="action" id="actionBtn" type="button" hidden>Start Break</button>

</main>

<div class="volume-control">
  <label class="volume-label" for="volume">Volume</label>
  <input type="range" id="volume" class="volume-slider" min="0" max="100" step="1" value="70" aria-label="Chime volume">
</div>

<a class="repo-link" href="https://github.com/btfcookies/20-20-20" target="_blank" rel="noopener noreferrer">View on GitHub</a>

<script src="script.js"></script>
</body>
</html>
